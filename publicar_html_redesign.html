
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--color-text-primary)}
.wrap{max-width:480px;margin:0 auto;padding:2rem 1rem}
.page-title{font-size:18px;font-weight:500;margin-bottom:2rem;color:var(--color-text-primary)}
.field{margin-bottom:1.25rem}
label{display:block;font-size:13px;color:var(--color-text-secondary);margin-bottom:6px}
.hint{font-size:12px;color:var(--color-text-tertiary);margin-top:4px}
textarea,input[type="text"],input[type="password"]{width:100%;background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);color:var(--color-text-primary);font-size:14px;padding:10px 12px;outline:none;font-family:var(--font-sans)}
textarea:focus,input:focus{border-color:var(--color-border-primary)}
textarea{height:140px;resize:vertical}
.tipo-badge{display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:4px 10px;border-radius:var(--border-radius-md);margin-top:6px;background:var(--color-background-warning);color:var(--color-text-warning)}
.tipo-badge.carousel{background:var(--color-background-info);color:var(--color-text-info)}
.tipo-badge.error{background:var(--color-background-danger);color:var(--color-text-danger)}
.color-grid{display:grid;grid-template-columns:repeat(9,1fr);gap:6px;margin-top:8px}
.swatch{width:100%;aspect-ratio:1;border-radius:var(--border-radius-md);cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s;display:flex;align-items:center;justify-content:center;font-size:14px}
.swatch:hover{transform:scale(1.08)}
.swatch.selected{border-color:var(--color-border-primary);transform:scale(1.08)}
.swatch.aleatorio{background:conic-gradient(#ff6b6b 0deg,#f4c400 90deg,#3d5afe 180deg,#e91e63 270deg,#ff6b6b 360deg)}
.color-label{font-size:12px;color:var(--color-text-secondary);margin-top:6px;min-height:16px}
.divider{border:none;border-top:0.5px solid var(--color-border-tertiary);margin:1.5rem 0}
.btn-primary{width:100%;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);color:var(--color-text-primary);font-size:14px;font-weight:500;padding:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s}
.btn-primary:hover{background:var(--color-background-secondary)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed}
.btn-accent{width:100%;background:#f4c400;border:none;border-radius:var(--border-radius-md);color:#0d0f14;font-size:14px;font-weight:500;padding:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:opacity .15s}
.btn-accent:hover{opacity:.88}
.btn-accent:disabled{opacity:.4;cursor:not-allowed}
.btns{display:flex;flex-direction:column;gap:8px}
.status{margin-top:1rem;font-size:13px;text-align:center;min-height:18px;color:var(--color-text-secondary)}
.status.ok{color:var(--color-text-success)}
.status.error{color:var(--color-text-danger)}
</style>

<div class="wrap">
  <p class="page-title">Publicar post</p>

  <div class="field">
    <label>Token de GitHub</label>
    <input type="password" id="token" placeholder="ghp_...">
    <p class="hint">Necesita permiso <code>workflow</code> en este repo.</p>
  </div>

  <div class="field">
    <label>Caption</label>
    <input type="text" id="caption" placeholder="Ej: y ya, sin drama.">
  </div>

  <div class="field">
    <label>Frases (una por línea)</label>
    <textarea id="frases" placeholder="Frase 1&#10;Frase 2" oninput="detectarTipo()"></textarea>
    <p class="hint">1 frase → single · 2 a 10 frases → carrusel</p>
    <div id="tipo-detectado"></div>
  </div>

  <div class="field">
    <label>Color de fondo</label>
    <div class="color-grid" id="color-grid"></div>
    <div class="color-label" id="color-label">Aleatorio (por defecto)</div>
  </div>

  <hr class="divider">

  <div class="btns">
    <button class="btn-accent" id="btn-publicar" onclick="publicar(false)">
      <i class="ti ti-send" aria-hidden="true"></i> Publicar ahora
    </button>
    <button class="btn-primary" id="btn-guardar" onclick="publicar(true)">
      <i class="ti ti-device-floppy" aria-hidden="true"></i> Guardar en sheet
    </button>
  </div>

  <div class="status" id="status"></div>
</div>

<script>
const OWNER="imgifra",REPO="frase-generator-v2",WORKFLOW="publish.yml";
const COLORES=[
  {hex:null,label:"Aleatorio"},
  {hex:"#f6f1e8",label:"retroWhite"},{hex:"#0d0f14",label:"retroBlack"},
  {hex:"#f4c400",label:"retroYellow"},{hex:"#3d5afe",label:"retroBlue"},
  {hex:"#e53935",label:"retroRed"},{hex:"#0d0208",label:"retroWine"},
  {hex:"#1a0033",label:"retroPurple"},{hex:"#0a1628",label:"retroNavy"},
  {hex:"#1c0a00",label:"retroCoffee"},{hex:"#d9723e",label:"retroOrange"},
  {hex:"#d4006a",label:"retroPink"},{hex:"#b28c2c",label:"retroMustard"},
  {hex:"#2e7d32",label:"retroGreen"},{hex:"#2c4a3e",label:"retroForest"},
  {hex:"#4a2040",label:"retroPlum"},{hex:"#5c3317",label:"retroToasted"},
  {hex:"#2e3f5c",label:"retroSlate"},{hex:"#7a0020",label:"retroCrimson"},
  {hex:"#b85c38",label:"retroTerra"},{hex:"#5c3d8f",label:"retroLavender"},
  {hex:"#4a5c2e",label:"retroOlive"},{hex:"#c8e6c9",label:"retroMint"},
  {hex:"#b3d9f2",label:"retroSky"},{hex:"#d6cfc4",label:"retroAsh"},
  {hex:"#0a0f0a",label:"retroNeon"}
];
let colorSeleccionado=null;
function initColores(){
  const grid=document.getElementById("color-grid");
  const light=["#f6f1e8","#f4c400","#c8e6c9","#b3d9f2","#d6cfc4"];
  COLORES.forEach(({hex,label})=>{
    const s=document.createElement("div");
    s.className="swatch"+(hex===null?" aleatorio":"");
    if(hex===null){s.classList.add("selected");s.innerHTML='<i class="ti ti-dice" style="font-size:14px;color:#fff" aria-hidden="true"></i>';}
    else{s.style.background=hex;}
    if(hex&&light.includes(hex))s.style.outline="1px solid #ccc";
    s.title=label;
    s.onclick=()=>seleccionarColor(hex,label,s);
    grid.appendChild(s);
  });
}
function seleccionarColor(hex,label,el){
  document.querySelectorAll(".swatch").forEach(s=>s.classList.remove("selected"));
  el.classList.add("selected");
  colorSeleccionado=hex;
  document.getElementById("color-label").textContent=hex===null?`Aleatorio (por defecto)`:`${label} — ${hex}`;
}
function parseFrases(){
  return document.getElementById("frases").value.split("\n").map(f=>f.trim()).filter(Boolean);
}
function setStatus(msg,cls){
  const el=document.getElementById("status");
  el.textContent=msg;el.className="status "+cls;
}
function detectarTipo(){
  const f=parseFrases();
  const el=document.getElementById("tipo-detectado");
  if(!f.length){el.innerHTML="";return;}
  if(f.length===1) el.innerHTML='<span class="tipo-badge"><i class="ti ti-photo" style="font-size:13px" aria-hidden="true"></i>Single</span>';
  else if(f.length<=10) el.innerHTML=`<span class="tipo-badge carousel"><i class="ti ti-carousel-horizontal" style="font-size:13px" aria-hidden="true"></i>Carrusel — ${f.length} frases</span>`;
  else el.innerHTML=`<span class="tipo-badge error"><i class="ti ti-alert-circle" style="font-size:13px" aria-hidden="true"></i>Máximo 10 frases (tienes ${f.length})</span>`;
}
async function publicar(soloSheet){
  const token=document.getElementById("token").value.trim();
  const caption=document.getElementById("caption").value.trim();
  const frases=parseFrases();
  const bp=document.getElementById("btn-publicar");
  const bg=document.getElementById("btn-guardar");
  setStatus("","");
  if(!token){setStatus("Falta el token de GitHub.","error");return;}
  if(!caption){setStatus("Falta el caption.","error");return;}
  if(frases.length<1){setStatus("Escribe al menos una frase.","error");return;}
  if(frases.length>10){setStatus("Máximo 10 frases.","error");return;}
  const tipo=frases.length===1?"single":"carousel";
  bp.disabled=true;bg.disabled=true;
  setStatus(soloSheet?"Guardando en sheet...":"Publicando...","");
  try{
    const res=await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/actions/workflows/${WORKFLOW}/dispatches`,{
      method:"POST",
      headers:{"Authorization":`Bearer ${token}`,"Accept":"application/vnd.github+json","Content-Type":"application/json"},
      body:JSON.stringify({ref:"main",inputs:{frases:frases.join("||"),caption,tipo,color:colorSeleccionado||"",solo_registrar:soloSheet?"true":"false"}})
    });
    if(res.status===204){
      setStatus(soloSheet?"Guardado en sheet. Se publicará en el próximo horario.":"Enviado como "+tipo+". En 2-3 minutos estará publicado.","ok");
      document.getElementById("frases").value="";
      document.getElementById("caption").value="";
      document.getElementById("tipo-detectado").innerHTML="";
    }else{
      const data=await res.json();
      setStatus("Error: "+data.message,"error");
    }
  }catch(err){setStatus("Error: "+err.message,"error");}
  finally{bp.disabled=false;bg.disabled=false;}
}
initColores();
</script>
