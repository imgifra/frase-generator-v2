<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mono Generator 🐵</title>

  <!-- Felt Tip Roman (modo normal) -->
  <link href="https://fonts.cdnfonts.com/css/felt-tip-roman" rel="stylesheet">

  <!-- Noto Serif para modo Retro 3D -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@700&display=swap" rel="stylesheet">

  <!-- Preload de la fuente oficial Brat (Arial Narrow real) -->
  <link rel="preload" 
        href="https://www.bratgenerator.com/sites/g/files/g2000017981/files/2024-03/arial_narrow-webfont.woff"
        as="font" 
        type="font/woff" 
        crossorigin>

  <!-- Fuente oficial Brat: Arial Narrow REAL -->
  <style>
    @font-face {
      font-family: 'arial_narrowregular';
      src: url('https://www.bratgenerator.com/sites/g/files/g2000017981/files/2024-03/arial_narrow-webfont.woff') format('woff');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
  </style>

  <style>
  @font-face {
    font-family: 'OPTICashew-ExtraBold';
    src: url('assets/OPTICashew-ExtraBold.woff') format('woff');
    font-weight: 800;
  }
  </style>



  <!-- Tailwind para layout de controles -->
  <script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --controls-h: 110px;
  }

  html, body {
  height: 100dvh;
  overflow: hidden;
  }


  body {
    background: #111;
    margin: 0;
    color: #fff;
    font-family: 'Felt Tip Roman', cursive;
    overflow: hidden;
  }

  /* Área de preview */
  #stage {
    height: calc(100vh - var(--controls-h));
    display: flex;
    justify-content: center;
    align-items: center;
  }

  #previewCanvas {
    width: min(90vw, 90vh);
    height: min(90vw, 90vh);
    box-shadow: 0 8px v 3px rgba(0,0,0,0.35);
    border-radius: 25px;
    background: #fff;
    display: block;
  }

  /* Panel de control inferior */
  .control-panel {
    position: fixed;
    bottom: 0;
    width: 100%;
    height: var(--controls-h);
    background: rgba(0,0,0,0.88);
    backdrop-filter: blur(10px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 6px;
    z-index: 20;
    padding-bottom: 90px;
  }

  .control-panel {
    padding-bottom: calc(env(safe-area-inset-bottom) + 12px);
  }

  #multiBtn {
    margin-bottom: calc(env(safe-area-inset-bottom) + 90px);
  }



  /* Switch tipo iPhone */
  .switch {
    position: relative;
    width: 55px;
    height: 28px;
  }
  .switch input { display:none; }

  .slider {
    position: absolute;
    cursor: pointer;
    inset: 0;
    background-color: #555;
    transition: .3s;
    border-radius: 34px;
  }
  .slider:before {
    content: "";
    position: absolute;
    height: 22px;
    width: 22px;
    left: 3px;
    bottom: 3px;
    background: #fff;
    transition: .3s;
    border-radius: 50%;
  }
  input:checked + .slider {
    background-color: #22c55e;
  }
  input:checked + .slider:before {
    transform: translateX(26px);
  }

  /* Input de color */
  #bgColor {
    width: 34px;
    height: 34px;
    padding: 0;
    border-radius: 999px;
    border: none;
    overflow: hidden;
  }
  #bgColor::-webkit-color-swatch,
  #bgColor::-moz-color-swatch {
    border: none;
    border-radius: 999px;
  }

  /* =========================================
            RESPONSIVE PARA CELULARES
     ========================================= */
  @media (max-width: 480px) {

    /* Aumentamos la altura para que todo quepa */
    :root {
      --controls-h: 160px;
    }

    /* Panel en vertical */
    .control-panel {
      height: var(--controls-h);
      flex-direction: column;
      gap: 10px;
      padding: 10px 8px;
    }

    /* Segunda fila: input + color + botón → vertical */
    .control-panel > div:nth-child(2) {
      display: flex;
      flex-direction: column;
      gap: 8px !important;
      width: 100%;
      padding: 0 10px;
    }

    /* Input ocupa todo el ancho */
    #textInput {
      width: 100% !important;
      font-size: 16px !important;
      padding: 8px !important;
    }

    /* Botón ocupa todo el ancho */
    #downloadBtn {
      width: 100%;
      padding: 8px !important;
      font-size: 14px !important;
    }

    /* Color picker más pequeño */
    #bgColor {
      width: 28px !important;
      height: 28px !important;
    }

  }
</style>

</head>
<body>

  <main id="stage">
    <canvas id="previewCanvas" width="1080" height="1080"></canvas>
  </main>

  <!-- Controles -->
  <div class="control-panel">
    <!-- Modo -->
    <div class="flex items-center justify-center gap-3 text-sm">
      <span>Modo:</span>
      <select id="modeSelect" class="text-black rounded-lg px-3 py-1 font-bold">
        <option value="normal">Normal</option>
        <option value="brat">Brat</option>
        <option value="retro3d">3D Retro</option>
      </select>
    </div>

    <!-- Texto + fondo + botón -->
    <div class="flex items-center justify-center gap-3 w-full px-3">
      <input
        id="textInput"
        type="text"
        placeholder="Escribe tu frase..."
        class="flex-1 p-2 rounded-lg text-black text-center font-bold text-lg outline-none"
      >

      <div class="flex items-center gap-1 text-sm">
        <span>Fondo:</span>
        <input type="color" id="bgColor" value="#ffffff">
      </div>

      <button
        id="downloadBtn"
        class="px-5 py-2 bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 active:bg-indigo-800"
      >
        Descargar PNG
      </button>
    </div>
  </div>

  <script>


/* ========= SETUP / INIT ========= */


    const canvas = document.getElementById("previewCanvas");
    const ctx = canvas.getContext("2d");
    // Marca de agua como imagen
    const watermarkImage = new Image();
    watermarkImage.src = "assets/marca2.png?v=1"; // cache-buster
    watermarkImage.onload = draw;
    const retroLogoImage = new Image();
    retroLogoImage.src = "assets/marca3.png?v=1";
    retroLogoImage.onload = draw;


    const input = document.getElementById("textInput");
    const bgColorInput = document.getElementById("bgColor");
    const modeSelect = document.getElementById("modeSelect");
    const downloadBtn = document.getElementById("downloadBtn");

    const CANVAS_SIZE = 1080;
    const PADDING = window.innerWidth < 600 ? 14 : 20;
    const BRAT_STRETCH_Y = 1.3; // alto de letras en modo brat

    // Eventos
    window.addEventListener("load", draw);
    document.fonts.ready.then(draw);

    input.addEventListener("input", draw);
    bgColorInput.addEventListener("input", draw);
    modeSelect.addEventListener("change", draw);
    downloadBtn.addEventListener("click", downloadPNG);

    // Botón para múltiples frases
    const multiBtn = document.createElement("button");
    multiBtn.innerText = "Generar múltiples";
    multiBtn.className =
      "px-4 py-2 bg-pink-600 text-white text-sm rounded-lg shadow-md hover:bg-pink-700 active:bg-pink-800";
    multiBtn.onclick = generateMultiple;
    document.querySelector(".control-panel").appendChild(multiBtn);

/* ========= APP FLOW ========= */
    function draw() {
      const text = input.value.trim();
      const bg = bgColorInput.value;
      const mode = modeSelect.value;

      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

      if (mode !== "retro3d") {
        drawWatermark();
        drawAEStyleText();
      }

      if (!text) {
        drawPlaceholder();
      } else {
        if (mode === "normal") {
          drawNormal(text, bg);
        } else if (mode === "brat") {
          drawBrat(text, bg);
        } else if (mode === "retro3d") {
          drawRetro3D(text, bg);
        }
      }

      if (mode === "brat") {
        drawCornerTagBrat();
      } else if (mode === "retro3d") {
        drawRetroCornerLogo();
        drawCornerTagRetro3D();
      } else {
        drawCornerTagNormal();
      }
    }

    function drawPlaceholder() {
      ctx.save();
      ctx.fillStyle = "rgba(0,0,0,0.35)";
      ctx.font = "42px 'Felt Tip Roman', cursive";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(
        "v 59 🐵",
        CANVAS_SIZE / 2,
        CANVAS_SIZE / 2
      );
      ctx.restore();
    }

    function downloadPNG() {
      const link = document.createElement("a");
      const mode = modeSelect.value;
      link.download = "nachozorra_" + mode + "_" + Date.now() + ".png";
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

    function generateMultiple() {
      const raw = input.value;
      const phrases = raw.split("@").map(t => t.trim()).filter(t => t.length > 0);

      if (phrases.length <= 1) {
        alert("Escribe varias frases separadas por @");
        return;
      }

      const originalText = raw;
      const originalBg = bgColorInput.value;
      const mode = modeSelect.value;

      const retroCycle = [
        "#f6f1e8", // retroWhite
        "#0d0f14", // retroBlack
        "#f4c400", // retroYellow
        "#3d5afe", // retroBlue
        "#e53935"  // retroRed
      ];

      let index = 0;

      function next() {
        if (index >= phrases.length) {
          input.value = originalText;
          bgColorInput.value = originalBg;
          draw();
          alert("Listo: todas las imágenes fueron generadas.");
          return;
        }

        const phrase = phrases[index];
        input.value = phrase;

        // Solo en retro3d: intercalar colores automáticamente
        if (mode === "retro3d") {
          bgColorInput.value = retroCycle[index % retroCycle.length];
        }

        draw();

        setTimeout(() => {
          const link = document.createElement("a");
          const safeMode = modeSelect.value;
          const colorSuffix = mode === "retro3d" ? `_c${(index % retroCycle.length) + 1}` : "";
          link.download = `frase_${index + 1}_${safeMode}${colorSuffix}.png`;
          link.href = canvas.toDataURL("image/png");
          link.click();

          index++;
          next();
        }, 250);
      }

      next();
    }
      


/* ========= MODE: NORMAL ========= */
    function drawNormal(text, bg) {
      ctx.save();

      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = getContrastColor(bg);

      // === Caja igual al estilo BRAT ===
      const boxWidth  = CANVAS_SIZE * 0.85;   // más angosto → más vertical
      const boxHeight = CANVAS_SIZE * 0.90;   // ocupa casi todo el alto

      const boxX = (CANVAS_SIZE - boxWidth) / 2;
      const boxY = (CANVAS_SIZE - boxHeight) / 2;

      // === Tamaños de letra más grandes ===
      const maxFont = 130;
      const minFont = 40;

      let fontSize = maxFont;
      let lines = [];

      // === Ajuste automático de tamaño ===
      while (fontSize > minFont) {
        ctx.font = `${fontSize}px 'Felt Tip Roman', cursive`;
        lines = wrapText(text, boxWidth, ctx);

        const totalHeight = lines.length * fontSize * 1.1;

        if (totalHeight <= boxHeight) break;  // cabe perfecto dentro del “box”

        fontSize -= 4;
      }

      // === Aplicar fuente final ===
      ctx.font = `${fontSize}px 'Felt Tip Roman', cursive`;
      lines = wrapText(text, boxWidth, ctx);

      // === Cálculo consistente del interlineado ===
      const lineHeight = fontSize * 1;     // ← mismo valor que en el dibujo
      const totalHeight = lines.length * lineHeight;

      // === Centrado vertical real ===
      let y = boxY + (boxHeight - totalHeight) / 2 + lineHeight / 2;

      // === Activar sombra suave (antes de dibujar las líneas) ===
      ctx.shadowColor = "rgba(0,0,0,0.20)";
      ctx.shadowBlur = 5;
      ctx.shadowOffsetX = 4;
      ctx.shadowOffsetY = 4;


      // === Dibujar texto línea por línea ===
      for (const line of lines) {
        ctx.strokeStyle = ctx.fillStyle;
        ctx.lineWidth = 2.35;
        ctx.strokeText(line, CANVAS_SIZE / 2, y);
        ctx.fillText(line, CANVAS_SIZE / 2, y);

        y += lineHeight;
      }


      ctx.restore();
    }

    function wrapText(text, maxWidth, ctxLocal) {
      const words = text.split(/\s+/).filter(Boolean);
      const lines = [];
      let current = "";

      // 1) Wrap codicioso normal
      for (const w of words) {
        const test = current ? current + " " + w : w;
        const width = ctxLocal.measureText(test).width;

        if (width > maxWidth && current) {
          lines.push(current);
          current = w;
        } else {
          current = test;
        }
      }

      if (current) lines.push(current);

      // 2) Evitar última línea de una sola palabra
      if (lines.length >= 2) {
        const last = lines[lines.length - 1];
        const prev = lines[lines.length - 2];

        if (last.split(/\s+/).length === 1) {
          const merged = prev + " " + last;
          if (ctxLocal.measureText(merged).width <= maxWidth * 1.12) {
            lines[lines.length - 2] = merged;
            lines.pop();
          }
        }
      }

      // 3) Rebalanceo suave entre líneas vecinas
      function widthOf(line) {
        return ctxLocal.measureText(line).width;
      }

      for (let pass = 0; pass < 2; pass++) {
        for (let i = 0; i < lines.length - 1; i++) {
          const a = lines[i];
          const b = lines[i + 1];

          const aWords = a.split(/\s+/);
          const bWords = b.split(/\s+/);

          if (bWords.length <= 1) continue;

          const aWidth = widthOf(a);
          const bWidth = widthOf(b);

          // Si la línea de arriba quedó mucho más corta, intenta subir una palabra
          if (aWidth < bWidth * 0.72) {
            const candidateA = a + " " + bWords[0];
            const candidateB = bWords.slice(1).join(" ");

            if (
              candidateB &&
              widthOf(candidateA) <= maxWidth &&
              candidateB.split(/\s+/).length >= 1
            ) {
              lines[i] = candidateA;
              lines[i + 1] = candidateB;
            }
          }
        }
      }

      return lines;
    }


/* ========= MODE: BRAT ========= */
    function drawBrat(rawText, bg) {
      ctx.save();

      const text = rawText.trim();
      if (!text) {
        ctx.restore();
        return;
      }

      const textColor = getContrastColor(bg);

      // Caja interna tipo "textOverlay"
      const boxWidth  = CANVAS_SIZE * 0.90; // más angosto para que no pida huecos gigantes
      const boxHeight = CANVAS_SIZE * 0.98;
      const boxX = (CANVAS_SIZE - boxWidth) / 2;
      const boxY = (CANVAS_SIZE - boxHeight) / 2;

      const maxFont = 470;
      const minFont = 20;

      let low = minFont;
      let high = maxFont;
      let bestFont = minFont;
      let bestLines = [];

      // Búsqueda binaria del tamaño de fuente (considerando estiramiento vertical)
      while (low <= high) {
        const mid = (low + high) >> 1;
        ctx.font = `${mid}px arial_narrowregular, 'Arial Narrow', sans-serif`;

        const candidateLines = wrapWordsToLines(text, boxWidth, ctx);
        const totalHeight = candidateLines.length * mid * 1.1 * BRAT_STRETCH_Y;

        // Verificar si cada palabra cabe en el ancho
        let wordTooWide = false;
        for (const line of candidateLines) {
          for (const w of line) {
            if (ctx.measureText(w).width > boxWidth) {
              wordTooWide = true;
              break;
            }
          }
          if (wordTooWide) break;
        }

        if (!wordTooWide && totalHeight <= boxHeight) {
          // Sí cabe
          bestFont = mid;
          bestLines = candidateLines;
          low = mid + 2;
        } else {
          // No cabe: letra demasiado grande para alguna palabra
          high = mid - 2;
        }

      }

      ctx.font = `${bestFont}px arial_narrowregular, 'Arial Narrow', sans-serif`;
      ctx.textBaseline = "top";
      ctx.fillStyle = textColor;

      const lineHeight = bestFont * 0.9;
      const blockHeight = bestLines.length * lineHeight * BRAT_STRETCH_Y;
      let y = boxY + (boxHeight - blockHeight) / 2;

      bestLines.forEach(words => {
        drawJustifiedLineTall(words, boxX, y, boxWidth, ctx);
        y += lineHeight * BRAT_STRETCH_Y;
      });

      ctx.restore();
    }

    function wrapWordsToLines(text, maxWidth, ctxLocal) {
      const words = text.split(/\s+/).filter(Boolean);
      const lines = [];
      let current = [];

      // --- 1. Wrap codicioso normal ---
      words.forEach(w => {
        const test = [...current, w].join(" ");
        const width = ctxLocal.measureText(test).width;
        if (width > maxWidth && current.length > 0) {
          lines.push(current);
          current = [w];
        } else {
          current.push(w);
        }
      });

      if (current.length) lines.push(current);

      // --- 2. Balanceo: evitar líneas de 1 palabra si se puede ---
      const naturalSpace = ctxLocal.measureText(" ").width;

      function lineWidth(line) {
        if (!line.length) return 0;
        const wordsWidth = line.reduce(
          (acc, w) => acc + ctxLocal.measureText(w).width,
          0
        );
        const gaps = line.length - 1;
        return wordsWidth + gaps * naturalSpace;
      }

      // Recorremos de arriba hacia abajo,
      // moviendo palabras de la siguiente línea a la actual
      for (let i = 0; i < lines.length - 1; i++) {
        let line = lines[i];
        let next = lines[i + 1];

        // Mientras esta línea tenga 1 palabra
        // y la siguiente tenga al menos 2, intentamos subir una palabra
        while (line.length === 1 && next && next.length >= 2) {
          const candidate = [...line, next[0]];
          if (lineWidth(candidate) <= maxWidth) {
            // Sí cabe: subimos la primera palabra de la siguiente línea
            line = candidate;
            next = next.slice(1);
            lines[i] = line;
            if (next.length) {
              lines[i + 1] = next;
            } else {
              // Si dejamos vacía la siguiente línea, la quitamos
              lines.splice(i + 1, 1);
              break;
            }
          } else {
            // No cabe "no está" juntos, nos quedamos como estamos
            break;
          }
        }
      }

      return lines;
    }

    function drawJustifiedLine(words, x, y, lineWidth, ctx) {
      if (!words || words.length === 0) return;

      ctx.save();
      ctx.filter = "blur(5px)";
      ctx.textBaseline = "top";

      const gaps = words.length - 1;
      const wordWidths = words.map(w => ctx.measureText(w).width);
      const wordsWidth = wordWidths.reduce((a, b) => a + b, 0);

      // Una sola palabra: no podemos justificar sin deformar → pegada a la izquierda
      if (gaps === 0) {
        ctx.fillText(words[0], x, y);
        ctx.restore();
        return;
      }

      // Espacio libre que hay que repartir en los huecos
      const freeSpace = lineWidth - wordsWidth;

      let spaceSize;
      if (freeSpace <= 0) {
        // Línea ya muy llena → usamos espacio natural
        spaceSize = ctx.measureText(" ").width;
      } else {
        // 💚 Justificado real: repartimos TODO el espacio libre entre los huecos
        spaceSize = freeSpace / gaps;
      }

      let cursorX = x;
      for (let i = 0; i < words.length; i++) {
        const w = words[i];
        ctx.fillText(w, cursorX, y);
        if (i < gaps) {
          cursorX += wordWidths[i] + spaceSize;
        }
      }

      ctx.restore();
    }

    function drawJustifiedLineTall(words, x, y, lineWidth, ctx) {
      ctx.save();
      ctx.translate(x, y);
      ctx.scale(1, BRAT_STRETCH_Y);
      drawJustifiedLine(words, 0, 0, lineWidth, ctx);
      ctx.restore();
    }



/* ========= MODE: RETRO 3D ========= */
    function drawRetro3D(rawText, bg) {
      ctx.save();

      const text = normalizeRetroText(rawText);
      if (!text) {
        ctx.restore();
        return;
      }

      const normalizedBg = getRetro3DBackground(bg);

      // Fondo base
      ctx.fillStyle = normalizedBg;
      ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

      // Grain del fondo en canvas aparte
      const bgCanvas = document.createElement("canvas");
      bgCanvas.width = CANVAS_SIZE;
      bgCanvas.height = CANVAS_SIZE;
      const bgCtx = bgCanvas.getContext("2d");

      bgCtx.drawImage(canvas, 0, 0);
      addGrain(bgCtx, 28); // un poco más visible, pero todavía controlado
      ctx.drawImage(bgCanvas, 0, 0);

      const palette = getRetro3DPalette(normalizedBg);

      const layoutBox = {
        width: CANVAS_SIZE * 0.72,
        height: CANVAS_SIZE * 0.68,
        x: CANVAS_SIZE / 2,
        y: CANVAS_SIZE / 2
      };

      const fontFamily = "'Noto Serif', serif";
      const fontWeight = 700;
      const maxFont = 132;
      const minFont = 34;

      // 1) Buscar el mejor layout global
      const bestLayout = findBestRetroLayout(text, {
        ctx,
        boxWidth: layoutBox.width,
        boxHeight: layoutBox.height,
        fontFamily,
        fontWeight,
        maxFont,
        minFont
      });

      if (!bestLayout || !bestLayout.lines.length) {
        ctx.restore();
        return;
      }

      ctx.textAlign = "center";
      ctx.textBaseline = "alphabetic";

      // 2) Dibujar bloque con leading óptico real
      const totalHeight = bestLayout.lines.reduce((acc, line) => acc + line.lineHeight, 0);
      let y = layoutBox.y - totalHeight / 2;

      for (const line of bestLayout.lines) {
        const drawY = y + line.ascent;

        drawRetro3DLine(line.text, layoutBox.x, drawY, {
          frontColor: palette.frontColor,
          midColor: palette.midColor,
          shadowColor: palette.shadowColor,
          fontSize: line.fontSize,
          tracking: line.tracking
        });

        y += line.lineHeight;
      }

      // Marca opcional: si luego quieres moverla o apagarla, mejor dejarla aparte
      // drawRetroSignature(layoutBox.x, y + 24);

      ctx.restore();
    }

    function drawRetro3DLine(line, x, y, opts) {
      const {
        frontColor,
        midColor,
        shadowColor,
        fontSize,
        tracking = 0
      } = opts;

      const depth = Math.max(4, Math.round(fontSize * 0.085));

      ctx.save();
      ctx.font = `700 ${fontSize}px 'Noto Serif', serif`;
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";

      const totalWidth = measureTrackedText(line, tracking);
      const startX = x - totalWidth / 2;

      for (let i = depth; i >= 1; i--) {
        const t = i / depth;

        let extrudeColor;
        if (t > 0.66) {
          extrudeColor = shadowColor;
        } else if (t > 0.33) {
          extrudeColor = midColor;
        } else {
          extrudeColor = shadowColor;
        }

        drawTrackedText(line, startX + i, y + i, extrudeColor, tracking);
      }

      drawTrackedText(line, startX, y, frontColor, tracking);

      ctx.restore();
    }

    function normalizeRetroText(text) {
      return String(text || "")
        .replace(/\s+/g, " ")
        .replace(/\s+([,.;:!?])/g, "$1")
        .trim();
    }

    function measureTrackedText(text, tracking = 0) {
      let width = 0;

      for (let i = 0; i < text.length; i++) {
        width += ctx.measureText(text[i]).width;
        if (i < text.length - 1) {
          width += tracking;
        }
      }

      return width;
    }

    function drawTrackedText(text, x, y, color, tracking = 0) {
      ctx.fillStyle = color;

      let cursorX = x;
      for (let i = 0; i < text.length; i++) {
        const ch = text[i];
        ctx.fillText(ch, cursorX, y);
        cursorX += ctx.measureText(ch).width + tracking;
      }
    }

    function findBestRetroLayout(text, config) {
      const {
        ctx,
        boxWidth,
        boxHeight,
        fontFamily,
        fontWeight,
        maxFont,
        minFont
      } = config;

      const words = text.split(" ").filter(Boolean);
      if (!words.length) return null;

      let best = null;

      for (let fontSize = maxFont; fontSize >= minFont; fontSize -= 2) {
        ctx.font = `${fontWeight} ${fontSize}px ${fontFamily}`;

        const candidateLineCounts = getCandidateLineCounts(words.length);

        for (const lineCount of candidateLineCounts) {
          const candidateBreaks = generateBalancedBreaks(words, lineCount, ctx, boxWidth);

          for (const lines of candidateBreaks) {
            const layout = buildRetroLineLayout(lines, {
              ctx,
              boxWidth,
              boxHeight,
              fontFamily,
              fontWeight,
              baseFontSize: fontSize
            });

            if (!layout) continue;

            const score = scoreRetroLayout(layout, {
              boxWidth,
              boxHeight,
              text
            });

            if (!best || score < best.score) {
              best = { ...layout, score };
            }
          }
        }

        // En cuanto encontramos algo suficientemente bueno con una fuente grande, paramos
        if (best && best.baseFontSize >= fontSize) {
          break;
        }
      }

      return best;
    }

    function getCandidateLineCounts(wordCount) {
      if (wordCount <= 3) return [1, 2];
      if (wordCount <= 6) return [2, 3];
      if (wordCount <= 10) return [3, 4, 5];
      if (wordCount <= 16) return [4, 5, 6];
      return [5, 6, 7];
    }

    function generateBalancedBreaks(words, lineCount, ctx, boxWidth) {
      if (lineCount <= 1) return [[words.join(" ")]];

      const results = [];
      const targetWordsPerLine = words.length / lineCount;

      function recurse(startIndex, currentLines) {
        const remainingWords = words.length - startIndex;
        const remainingLines = lineCount - currentLines.length;

        // Caso final: construir última línea
        if (remainingLines === 1) {
          const finalLine = words.slice(startIndex).join(" ");
          const lines = [...currentLines, finalLine];

          // evitar última línea demasiado floja
          if (lines.length > 1) {
            const lastWords = finalLine.trim().split(/\s+/).filter(Boolean);
            if (lastWords.length <= 1) return;
          }

          // evitar cortar bloque entre comillas de forma fea
          if (hasBrokenQuoteBlock(lines)) return;

          if (isValidLineSet(lines, ctx, boxWidth)) {
            results.push(lines);
          }
          return;
        }

        // rango flexible alrededor del promedio esperado
        const ideal = Math.round(targetWordsPerLine);
        const minTake = Math.max(1, ideal - 2);
        const maxTake = Math.min(
          remainingWords - (remainingLines - 1),
          ideal + 2
        );

        for (let take = minTake; take <= maxTake; take++) {
          if (startIndex + take > words.length) continue;

          const lineWords = words.slice(startIndex, startIndex + take);
          const line = lineWords.join(" ");

          // Evitar líneas flojas tipo "de", "la", "en", etc. demasiado solas
          if (isWeakStandaloneLine(line)) continue;

          // Evitar líneas demasiado cortas en posiciones intermedias
          if (currentLines.length > 0 && lineWords.length === 1) continue;

          // Evitar partir mal frases entre comillas:
          // si una línea abre comillas pero no las cierra, mejor no aceptarla
          const quoteCount = (line.match(/"/g) || []).length;
          if (quoteCount === 1 && !line.trim().endsWith('"')) continue;

          currentLines.push(line);
          recurse(startIndex + take, currentLines);
          currentLines.pop();
        }
      }

      recurse(0, []);

      // fallback por si no salió nada
      if (!results.length) {
        const fallback = simpleEvenSplit(words, lineCount);
        if (!hasBrokenQuoteBlock(fallback)) {
          results.push(fallback);
        } else {
          results.push(simpleEvenSplit(words, Math.max(1, lineCount - 1)));
        }
      }

      // deduplicar
      const unique = [];
      const seen = new Set();

      for (const r of results) {
        const key = r.join(" | ");
        if (!seen.has(key)) {
          seen.add(key);
          unique.push(r);
        }
      }

      return unique.slice(0, 40);
    }

    function hasBrokenQuoteBlock(lines) {
      let insideQuote = false;

      for (const line of lines) {
        const quoteCount = (line.match(/"/g) || []).length;

        if (quoteCount === 0) {
          continue;
        }

        // Si hay una sola comilla en la línea, abre o cierra bloque
        if (quoteCount % 2 === 1) {
          insideQuote = !insideQuote;
        }
      }

      // Si termina "abierto", significa que partimos raro el bloque
      return insideQuote;
    }

    function isValidLineSet(lines, ctx, boxWidth) {
      const widths = lines.map(line => ctx.measureText(line).width);
      const widest = Math.max(...widths);

      if (widest > boxWidth * 1.06) return false;

      // evitar últimas líneas absurdamente pequeñas
      if (lines.length > 1) {
        const lastW = widths[widths.length - 1];
        const maxW = Math.max(...widths);
        if (lastW < maxW * 0.34) return false;
      }

      return true;
    }

    function simpleEvenSplit(words, lineCount) {
      const lines = [];
      let start = 0;

      for (let i = 0; i < lineCount; i++) {
        const remainingWords = words.length - start;
        const remainingLines = lineCount - i;
        const take = Math.ceil(remainingWords / remainingLines);

        lines.push(words.slice(start, start + take).join(" "));
        start += take;
      }

      return lines.filter(Boolean);
    }

    function isWeakStandaloneLine(line) {
      const weak = new Set([
        "de", "del", "la", "las", "el", "los",
        "en", "y", "o", "u", "a", "al",
        "por", "para", "con", "sin", "pero"
      ]);

      const parts = line.trim().toLowerCase().split(/\s+/);
      return parts.length === 1 && weak.has(parts[0]);
    }

    function buildRetroLineLayout(lines, config) {
      const {
        ctx,
        boxWidth,
        boxHeight,
        fontFamily,
        fontWeight,
        baseFontSize
      } = config;

      ctx.font = `${fontWeight} ${baseFontSize}px ${fontFamily}`;
      const baseWidths = lines.map(line => ctx.measureText(line).width);

      const maxW = Math.max(...baseWidths);
      const minW = Math.min(...baseWidths);

      const lineData = lines.map((text, i) => {
        const rawWidth = baseWidths[i];
        const posRatio = lines.length === 1 ? 0.5 : i / (lines.length - 1);

        const centerBias = 1 - Math.abs(posRatio - 0.5) * 2;
        const widthRatio = maxW === minW ? 0.5 : (rawWidth - minW) / (maxW - minW);

        // base suave, pero con un poquito más de vida
        let scale = 0.965 + centerBias * 0.03 + widthRatio * 0.015;

        // potenciar primera línea si es corta y el bloque tiene varias líneas
        // potenciar primera línea SOLO si es realmente corta y no rompe equilibrio
        if (i === 0 && lines.length >= 3) {
          const firstLineRatio = rawWidth / maxW;

          if (firstLineRatio < 0.55) {
            scale += 0.025; // suave
          }
        }

        // pequeña ayuda al cierre si queda débil
        if (i === lines.length - 1) {
          if (rawWidth < maxW * 0.68) {
            scale += 0.015;
          } else {
            scale += 0.008;
          }
        }

        scale = clamp(scale, 0.96, 1.06);

        const fontSize = baseFontSize * scale;
        ctx.font = `${fontWeight} ${fontSize}px ${fontFamily}`;

        // tracking según ancho natural
        const naturalWidth = ctx.measureText(text).width;
        const tracking = getRetroTracking(text, fontSize, naturalWidth, boxWidth);

        // ancho real con tracking
        const trackedWidth = measureTrackedText(text, tracking);

        const metrics = ctx.measureText(text);
        const ascent = metrics.actualBoundingBoxAscent || fontSize * 0.74;
        const descent = metrics.actualBoundingBoxDescent || fontSize * 0.22;

        // leading óptico cómodo
        const lineHeight = ascent + descent + fontSize * 0.09;

        return {
          text,
          width: trackedWidth,
          naturalWidth,
          fontSize,
          ascent,
          descent,
          lineHeight,
          tracking
        };
      });

      const totalHeight = lineData.reduce((acc, l) => acc + l.lineHeight, 0);
      const widestAdjusted = Math.max(...lineData.map(l => l.width));

      if (totalHeight > boxHeight) return null;
      if (widestAdjusted > boxWidth * 1.03) return null;

      return {
        lines: lineData,
        totalHeight,
        widest: widestAdjusted,
        baseFontSize
      };
    }

    function getRetroTracking(text, fontSize, lineWidth, boxWidth) {
      const chars = text.replace(/\s+/g, "").length || 1;
      const density = lineWidth / boxWidth;

      let tracking = 0;

      // líneas muy cortas y pesadas: un pelo más cerradas
      if (density < 0.45) tracking -= fontSize * 0.006;

      // líneas largas: neutras o apenas abiertas
      if (density > 0.78) tracking += fontSize * 0.003;

      // textos grandes: mejor no abrir demasiado
      if (fontSize > 100) tracking -= fontSize * 0.002;

      // clamp muy suave
      tracking = clamp(tracking, -fontSize * 0.006, fontSize * 0.003);

      return tracking;
    }

    function scoreRetroLayout(layout, config) {
      const { boxWidth, boxHeight } = config;
      const lines = layout.lines;
      const widths = lines.map(l => l.width);
      const widest = Math.max(...widths);
      const totalHeight = layout.totalHeight;

      let score = 0;

      const widthUsage = widest / boxWidth;
      const heightUsage = totalHeight / boxHeight;

      // ocupación general
      score += Math.abs(0.84 - widthUsage) * 140;
      score += Math.abs(0.72 - heightUsage) * 115;

      // diferencias bruscas entre líneas vecinas
      for (let i = 1; i < widths.length; i++) {
        const diff = Math.abs(widths[i] - widths[i - 1]) / widest;
        score += diff * 90;
      }

      // castigo extra a silueta muy irregular respecto al promedio
      const avgWidth = widths.reduce((a, b) => a + b, 0) / widths.length;
      for (const w of widths) {
        const variance = Math.abs(w - avgWidth) / widest;
        score += variance * 45;
      }

      // primera y última línea débiles
      if (widths.length > 1) {
        const firstRatio = widths[0] / widest;
        const lastRatio = widths[widths.length - 1] / widest;

        if (firstRatio < 0.32) score += 25;
        if (firstRatio < 0.26) score += 50;

        if (lastRatio < 0.48) score += 40;
        if (lastRatio < 0.38) score += 85;
      }

      // castigar "panza" central exagerada
      if (widths.length >= 3) {
        const mid = Math.floor(widths.length / 2);
        const centerW = widths[mid];
        const avgNeighbors =
          mid > 0 && mid < widths.length - 1
            ? (widths[mid - 1] + widths[mid + 1]) / 2
            : centerW;

        const bulge = (centerW - avgNeighbors) / widest;
        if (bulge > 0.12) score += bulge * 180;
        if (bulge > 0.18) score += 40;
      }

      // preferir centro orgánico, pero sin obligarlo demasiado
      if (widths.length >= 3) {
        const mid = Math.floor(widths.length / 2);
        const centerW = widths[mid];
        const edgeAvg = (widths[0] + widths[widths.length - 1]) / 2;

        if (centerW < edgeAvg * 0.92) {
          score += 20;
        }
      }

      // evitar extremos raros de cantidad de líneas
      if (widths.length === 1) score += 60;
      if (widths.length > 7) score += 60;

      return score;
    }


/* ========= OVERLAYS / BRANDING ========= */
    function drawWatermark() {
      if (!watermarkImage.complete) return;

      const size = CANVAS_SIZE * 1.1;

      // Canvas temporal para componer sombra + imagen con alpha 1.0
      const temp = document.createElement("canvas");
      temp.width = CANVAS_SIZE;
      temp.height = CANVAS_SIZE;
      const tctx = temp.getContext("2d");

      tctx.save();

      // === SOMBRA IGUAL A LA DEL TEXTO ===
      tctx.shadowColor = "rgba(0,0,0,0.40)";
      tctx.shadowBlur = 8;
      tctx.shadowOffsetX = 4;
      tctx.shadowOffsetY = 4;

      // === DIBUJAR PNG CENTRADO (con sombra) ===
      tctx.translate(CANVAS_SIZE / 2, CANVAS_SIZE / 2);
      tctx.drawImage(
        watermarkImage,
        -size / 2,
        -size / 2,
        size,
        size
      );

      tctx.restore();

      // === AHORA APLICAMOS LA OPACIDAD FINAL ===
      ctx.save();
      ctx.globalAlpha = 0.06;  // << ESTA ES LA ÚNICA OPACIDAD
      ctx.drawImage(temp, 0, 0);
      ctx.restore();
    }

    function drawAEStyleText() {
      const textLines = ["\u00A0MONA", "\u00A0\u00A0\u00A0\u00A0CASTROSA"];

      // ==================================================
      // 1. Canvas temporal para fabricar el STROKE OUTSIDE
      // ==================================================
      const temp = document.createElement("canvas");
      temp.width = CANVAS_SIZE;
      temp.height = CANVAS_SIZE;
      const tctx = temp.getContext("2d");

      const x = CANVAS_SIZE / 2 + 220;  // << mueve todo a la derecha
      const y = CANVAS_SIZE * 0.78 - 15;

      const fontSize = 90;
      const lineSpacing = fontSize * 0.9;

      tctx.font = `${fontSize}px 'OPTICashew-ExtraBold'`;
      tctx.textAlign = "center";
      tctx.textBaseline = "middle";
      tctx.globalAlpha = 1.0; // alpha se aplica luego

      // -------------- Stroke total (dentro y fuera) --------------
      tctx.strokeStyle = "black";
      tctx.lineWidth = 16;  // equivalente aproximado a StrokeWidth=8 de AE

      for (let i = 0; i < textLines.length; i++) {
        const ly = y + (i - 0.5) * lineSpacing;
        tctx.strokeText(textLines[i], x, ly);
      }

      // -------------- Borrar interior (solo deja fuera) --------------
      tctx.globalCompositeOperation = "destination-out";

      for (let i = 0; i < textLines.length; i++) {
        const ly = y + (i - 0.5) * lineSpacing;
        tctx.fillText(textLines[i], x, ly);
      }

      // ==================================================
      // 2. Canvas final para sombra + relleno (como AE)
      // ==================================================
      const finalCanvas = document.createElement("canvas");
      finalCanvas.width = CANVAS_SIZE;
      finalCanvas.height = CANVAS_SIZE;
      const fctx = finalCanvas.getContext("2d");

      // -------- Sombra estilo After Effects --------
      fctx.shadowColor = "rgba(0,0,0,0.80)";   // parecido a opacityPct:128
      fctx.shadowBlur = 5;                     // softness=5
      fctx.shadowOffsetX = 4;                 // dirección 135°
      fctx.shadowOffsetY = 4;                  // distancia 6 px aprox

      // borde externo con sombra
      fctx.drawImage(temp, 0, 0);

      // quitar sombra antes del relleno
      fctx.shadowBlur = 0;

      // -------- Relleno blanco --------
      fctx.globalAlpha = 1.0;
      fctx.fillStyle = "white";
      fctx.font = `${fontSize}px 'OPTICashew-ExtraBold'`;
      fctx.textAlign = "center";
      fctx.textBaseline = "middle";

      for (let i = 0; i < textLines.length; i++) {
        const ly = y + (i - 0.5) * lineSpacing;
        fctx.fillText(textLines[i], x, ly);
      }

      // ==================================================
      // 3. Alpha global bajo (marca de agua) y draw final
      // ==================================================
      ctx.save();
      ctx.globalAlpha = 0.06;   // <<<<<< EXACTO como pediste
      ctx.drawImage(finalCanvas, 0, 0);
      ctx.restore();
    }

    function drawCornerTagRetro3D() {
      const tag = "@monacastrosa";

      ctx.save();

      const padding = 35;
      const x = CANVAS_SIZE / 2;
      const y = 35;

      const normalizedBg = getRetro3DBackground(bgColorInput.value);
      const palette = getRetro3DPalette(normalizedBg);

      const fontSize = 30;
      const depth = 3; // grosor del volumen

      ctx.font = `700 ${fontSize}px 'Noto Serif', serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "top";

      for (let i = depth; i >= 1; i--) {
        const t = i / depth;

        let extrudeColor;
        if (t > 2/3) {
          extrudeColor = palette.shadowColor;
        } else if (t > 1/3) {
          extrudeColor = palette.frontColor;
        } else {
          extrudeColor = palette.shadowColor;
        }

        ctx.fillStyle = extrudeColor;
        ctx.fillText(tag, x + i, y + i);
      }

      ctx.fillStyle = palette.frontColor;
      ctx.fillText(tag, x, y);

      ctx.restore();
    }

/* ========= VISUAL UTILS ========= */
    function addSubtleTexture(ctx, amount = 8) {
      const imageData = ctx.getImageData(0, 0, CANVAS_SIZE, CANVAS_SIZE);
      const data = imageData.data;

      for (let i = 0; i < data.length; i += 4) {
        const noise = (Math.random() - 0.5) * amount;

        data[i] += noise * 0.3;
        data[i + 1] += noise * 0.3;
        data[i + 2] += noise * 0.3;
      }

      ctx.putImageData(imageData, 0, 0);
    }

    function addGrain(targetCtx, amount = 15) {
      const imageData = targetCtx.getImageData(0, 0, CANVAS_SIZE, CANVAS_SIZE);
      const data = imageData.data;

      for (let i = 0; i < data.length; i += 4) {
        const noise = (Math.random() - 0.5) * amount;

        data[i]     += noise;
        data[i + 1] += noise;
        data[i + 2] += noise;
      }

      targetCtx.putImageData(imageData, 0, 0);
    }

    function getContrastColor(hex) {
      hex = hex.replace("#", "");
      const r = parseInt(hex.slice(0, 2), 16);
      const g = parseInt(hex.slice(2, 4), 16);
      const b = parseInt(hex.slice(4, 6), 16);
      const brightness = (r * 299 + g * 587 + b * 114) / 1000;
      return brightness > 150 ? "#000000" : "#ffffff";
    }

    function getBrightness(hex) {
      hex = hex.replace("#", "");
      const r = parseInt(hex.slice(0, 2), 16);
      const g = parseInt(hex.slice(2, 4), 16);
      const b = parseInt(hex.slice(4, 6), 16);
      return (r * 299 + g * 587 + b * 114) / 1000;
    }

    function getRetro3DBackground(hex) {
      const retroYellow = "#f4c400";
      const retroBlue   = "#3d5afe";
      const retroRed    = "#e53935";
      const retroWhite  = "#f6f1e8";
      const retroBlack  = "#0d0f14";

      const input = hexToRgb(hex);

      const whiteDistance =
        Math.pow(input.r - 255, 2) +
        Math.pow(input.g - 255, 2) +
        Math.pow(input.b - 255, 2);

      if (whiteDistance < 2000) {
        return retroWhite;
      }

      const blackDistance =
        Math.pow(input.r - 10, 2) +
        Math.pow(input.g - 10, 2) +
        Math.pow(input.b - 10, 2);

      if (blackDistance < 2000) {
        return retroBlack;
      }

      const targetColors = [retroYellow, retroBlue, retroRed];

      let nearest = targetColors[0];
      let minDistance = Infinity;

      for (const color of targetColors) {
        const c = hexToRgb(color);
        const distance =
          Math.pow(input.r - c.r, 2) +
          Math.pow(input.g - c.g, 2) +
          Math.pow(input.b - c.b, 2);

        if (distance < minDistance) {
          minDistance = distance;
          nearest = color;
        }
      }

      return nearest;
    }

    function getRetro3DPalette(bg) {
      const retroYellow = "#f4c400";
      const retroBlue   = "#3d5afe";
      const retroRed    = "#e53935";
      const retroWhite  = "#f6f1e8";
      const retroBlack  = "#0d0f14";
      
      if (bg.toLowerCase() === retroBlack) {
        return {
          frontColor: "#39ff14",
          midColor: "#39ff14",
          shadowColor: "#c600eb",
        };
      }

      if (bg.toLowerCase() === retroWhite) {
        return {
          frontColor: "#ff2bd6",
          midColor: "#ff2bd6",
          shadowColor: "#39ff14",
        };
      }

      if (bg.toLowerCase() === retroYellow) {
        return {
          frontColor: retroBlue,
          midColor: retroBlue,
          shadowColor: retroRed,
        };
      }

      if (bg.toLowerCase() === retroBlue) {
        return {
          frontColor: retroRed,
          midColor: retroRed,
          shadowColor: retroYellow,
        };
      }

      // fondo rojo
      return {
        frontColor: retroYellow,
        midColor: retroYellow,
        shadowColor: retroBlue,
      };
    }
    
    function hexToRgb(hex) {
      hex = hex.replace("#", "");
      return {
        r: parseInt(hex.slice(0, 2), 16),
        g: parseInt(hex.slice(2, 4), 16),
        b: parseInt(hex.slice(4, 6), 16)
      };
    }
  


/* ========= GENERAL UTILS ========= */
    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }
  
  </script>
