<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Publicar · monacastrosa</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #080808;
      color: #d9d3c9;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      min-height: 100vh;
      padding: 56px 24px 80px;
    }

    .wrap {
      max-width: 420px;
      margin: 0 auto;
    }

    .eyebrow {
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: #3a3a3a;
      margin-bottom: 36px;
    }

    .page-title {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 32px;
      font-weight: 400;
      color: #e8e2d9;
      margin-bottom: 52px;
      line-height: 1.2;
      letter-spacing: -0.01em;
    }

    .field {
      margin-bottom: 32px;
    }

    .field-label {
      font-size: 10px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #3a3a3a;
      margin-bottom: 10px;
      display: block;
    }

    .field-input {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid #1e1e1e;
      color: #d9d3c9;
      font-size: 15px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      padding: 8px 0 10px;
      outline: none;
      transition: border-color 0.2s;
    }

    .field-input::placeholder { color: #2a2a2a; }
    .field-input:focus { border-bottom-color: #555; }

    textarea.field-input {
      resize: none;
      height: 100px;
      line-height: 1.7;
    }

    .field-hint {
      font-size: 11px;
      color: #2e2e2e;
      margin-top: 8px;
    }

    .tipo-tag {
      font-size: 11px;
      letter-spacing: 0.06em;
      color: #3a3a3a;
      margin-top: 8px;
      min-height: 16px;
      transition: color 0.2s;
    }

    .tipo-tag.single   { color: #888; }
    .tipo-tag.carousel { color: #888; }
    .tipo-tag.over     { color: #7a2020; }

    .divider {
      border: none;
      border-top: 1px solid #111;
      margin: 36px 0;
    }

    .color-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-bottom: 10px;
    }

    .swatch {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }

    .swatch:hover  { transform: scale(1.18); }
    .swatch.selected { border-color: #e8e2d9; transform: scale(1.18); }

    .swatch.aleatorio {
      background: conic-gradient(#ff6b6b 0deg, #f4c400 90deg, #3d5afe 180deg, #e91e63 270deg, #ff6b6b 360deg);
    }

    .selected-label {
      font-size: 11px;
      color: #3a3a3a;
      min-height: 16px;
      letter-spacing: 0.04em;
    }

    .btns {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 44px;
    }

    .btn-main {
      width: 100%;
      background: #e8e2d9;
      color: #080808;
      border: none;
      padding: 15px 24px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-main:hover    { opacity: 0.85; }
    .btn-main:disabled { opacity: 0.25; cursor: not-allowed; }

    .btn-ghost {
      width: 100%;
      background: transparent;
      color: #3a3a3a;
      border: 1px solid #1e1e1e;
      padding: 15px 24px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }

    .btn-ghost:hover    { color: #d9d3c9; border-color: #333; }
    .btn-ghost:disabled { opacity: 0.25; cursor: not-allowed; }

    #status {
      font-size: 12px;
      text-align: center;
      margin-top: 20px;
      min-height: 18px;
      letter-spacing: 0.04em;
      color: #3a3a3a;
    }

    #status.ok    { color: #4a7a4a; }
    #status.error { color: #7a3030; }
  </style>
</head>
<body>

<div class="wrap">

  <p class="eyebrow">monacastrosa</p>
  <h1 class="page-title">Nuevo post</h1>

  <div class="field">
    <span class="field-label">Token de GitHub</span>
    <input class="field-input" type="password" id="token" placeholder="ghp_..." autocomplete="current-password">
    <p class="field-hint">Necesita permiso <code>workflow</code> en este repo.</p>
  </div>

  <div class="field">
    <span class="field-label">Caption</span>
    <input class="field-input" type="text" id="caption" placeholder="y ya, sin drama.">
  </div>

  <div class="field">
    <span class="field-label">Frases</span>
    <textarea class="field-input" id="frases" placeholder="Una por línea&#10;1 frase → single · 2–10 → carrusel" oninput="detectarTipo()"></textarea>
    <p class="tipo-tag" id="tipo-detectado"></p>
  </div>

  <hr class="divider">

  <div class="field">
    <span class="field-label">Color</span>
    <div class="color-grid" id="color-grid"></div>
    <p class="selected-label" id="color-label">Aleatorio</p>
  </div>

  <div class="btns">
    <button class="btn-main" id="btn-publicar" onclick="publicar(false)">Publicar ahora</button>
    <button class="btn-ghost" id="btn-guardar"  onclick="publicar(true)">Guardar en sheet</button>
  </div>

  <p id="status"></p>

</div>

<script>
  const OWNER    = "imgifra";
  const REPO     = "frase-generator-v2";
  const WORKFLOW = "publish.yml";

  // COLORES_START
  const COLORES = [
    { hex: null,      label: "Aleatorio" },
    { hex: "#f6f1e8", label: "retroWhite" },
    { hex: "#0d0f14", label: "retroBlack" },
    { hex: "#f4c400", label: "retroYellow" },
    { hex: "#3d5afe", label: "retroBlue" },
    { hex: "#e53935", label: "retroRed" },
    { hex: "#0d0208", label: "retroWine" },
    { hex: "#1a0033", label: "retroPurple" },
    { hex: "#0a1628", label: "retroNavy" },
    { hex: "#1c0a00", label: "retroCoffee" },
    { hex: "#d9723e", label: "retroOrange" },
    { hex: "#d4006a", label: "retroPink" },
    { hex: "#b28c2c", label: "retroMustard" },
    { hex: "#2e7d32", label: "retroGreen" },
    { hex: "#2c4a3e", label: "retroForest" },
    { hex: "#4a2040", label: "retroPlum" },
    { hex: "#5c3317", label: "retroToasted" },
    { hex: "#2e3f5c", label: "retroSlate" },
    { hex: "#7a0020", label: "retroCrimson" },
    { hex: "#b85c38", label: "retroTerra" },
    { hex: "#5c3d8f", label: "retroLavender" },
    { hex: "#4a5c2e", label: "retroOlive" },
    { hex: "#c8e6c9", label: "retroMint" },
    { hex: "#b3d9f2", label: "retroSky" },
    { hex: "#d6cfc4", label: "retroAsh" },
    { hex: "#0a0f0a", label: "retroNeon" },
  ];
  // COLORES_END

  let colorSeleccionado = null;

  function initColores() {
    const grid = document.getElementById("color-grid");
    const light = ["#f6f1e8", "#f4c400", "#c8e6c9", "#b3d9f2", "#d6cfc4"];

    COLORES.forEach(({ hex, label }) => {
      const s = document.createElement("div");
      s.className = "swatch" + (hex === null ? " aleatorio" : "");
      if (hex === null) {
        s.classList.add("selected");
      } else {
        s.style.background = hex;
        if (light.includes(hex)) s.style.outline = "1px solid #2a2a2a";
      }
      s.title = label;
      s.onclick = () => seleccionarColor(hex, label, s);
      grid.appendChild(s);
    });
  }

  function seleccionarColor(hex, label, el) {
    document.querySelectorAll(".swatch").forEach(s => s.classList.remove("selected"));
    el.classList.add("selected");
    colorSeleccionado = hex;
    document.getElementById("color-label").textContent =
      hex === null ? "Aleatorio" : `${label} · ${hex}`;
  }

  function parseFrases() {
    return document.getElementById("frases").value
      .split("\n").map(f => f.trim()).filter(Boolean);
  }

  function setStatus(msg, cls) {
    const el = document.getElementById("status");
    el.textContent = msg;
    el.className = cls;
  }

  function detectarTipo() {
    const frases = parseFrases();
    const el = document.getElementById("tipo-detectado");
    if (frases.length === 0) {
      el.textContent = "";
      el.className = "tipo-tag";
    } else if (frases.length === 1) {
      el.textContent = "Single";
      el.className = "tipo-tag single";
    } else if (frases.length <= 10) {
      el.textContent = `Carrusel · ${frases.length} frases`;
      el.className = "tipo-tag carousel";
    } else {
      el.textContent = `Máximo 10 frases (tienes ${frases.length})`;
      el.className = "tipo-tag over";
    }
  }

  async function publicar(soloSheet) {
    const token   = document.getElementById("token").value.trim();
    const caption = document.getElementById("caption").value.trim();
    const frases  = parseFrases();
    const bp = document.getElementById("btn-publicar");
    const bg = document.getElementById("btn-guardar");

    setStatus("", "");

    if (!token)             { setStatus("Falta el token de GitHub.", "error"); return; }
    if (!caption)           { setStatus("Falta el caption.", "error"); return; }
    if (frases.length < 1)  { setStatus("Escribe al menos una frase.", "error"); return; }
    if (frases.length > 10) { setStatus("Máximo 10 frases.", "error"); return; }

    const tipo = frases.length === 1 ? "single" : "carousel";

    bp.disabled = true;
    bg.disabled = true;
    setStatus(soloSheet ? "Guardando en sheet..." : "Publicando...", "");

    try {
      const res = await fetch(
        `https://api.github.com/repos/${OWNER}/${REPO}/actions/workflows/${WORKFLOW}/dispatches`,
        {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${token}`,
            "Accept": "application/vnd.github+json",
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            ref: "main",
            inputs: {
              frases:         frases.join("||"),
              caption,
              tipo,
              color:          colorSeleccionado || "",
              solo_registrar: soloSheet ? "true" : "false"
            }
          })
        }
      );

      if (res.status === 204) {
        setStatus(
          soloSheet
            ? "Guardado en sheet. Se publicará en el próximo horario."
            : `Enviado como ${tipo}. En 2–3 minutos estará publicado.`,
          "ok"
        );
        document.getElementById("frases").value  = "";
        document.getElementById("caption").value = "";
        document.getElementById("tipo-detectado").textContent = "";
        document.getElementById("tipo-detectado").className = "tipo-tag";
      } else {
        const data = await res.json();
        setStatus(`Error: ${data.message}`, "error");
      }
    } catch (err) {
      setStatus(`Error: ${err.message}`, "error");
    } finally {
      bp.disabled = false;
      bg.disabled = false;
    }
  }

  initColores();
</script>

</body>
</html>
